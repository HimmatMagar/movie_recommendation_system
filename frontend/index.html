<!DOCTYPE html>
<html lang="en">

<head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
      <title>Movie Recommender</title>
      <style>
            * {
                  margin: 0;
                  padding: 0;
                  box-sizing: border-box;
                  font-family: system-ui, 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            }

            body {
                  background: linear-gradient(135deg, #0f0c1f 0%, #1a1a2e 100%);
                  min-height: 100vh;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  padding: 1.5rem;
            }

            .container {
                  max-width: 1200px;
                  width: 100%;
                  margin: 0 auto;
            }

            /* Main Card */
            .recommender-card {
                  background: rgba(20, 20, 40, 0.75);
                  backdrop-filter: blur(16px);
                  border-radius: 2.5rem;
                  padding: 2rem 2rem 2.5rem;
                  box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
                  transition: all 0.2s ease;
            }

            /* Heading */
            .hero {
                  text-align: center;
                  margin-bottom: 2.5rem;
            }

            .hero h1 {
                  font-size: 3rem;
                  font-weight: 800;
                  background: linear-gradient(125deg, #ffffff, #e2c28b, #ffb347);
                  background-clip: text;
                  -webkit-background-clip: text;
                  color: transparent;
                  letter-spacing: -0.02em;
                  text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            }

            .hero .badge {
                  display: inline-block;
                  margin-top: 0.5rem;
                  font-size: 0.8rem;
                  background: #2a2a44;
                  padding: 0.2rem 1rem;
                  border-radius: 40px;
                  color: #c4b5fd;
                  font-weight: 500;
            }

            /* Search Section */
            .search-section {
                  max-width: 650px;
                  margin: 0 auto 2rem auto;
            }

            .search-box {
                  display: flex;
                  gap: 0.75rem;
                  align-items: center;
                  background: #0f0f1c;
                  border-radius: 80px;
                  padding: 0.35rem 0.35rem 0.35rem 1.5rem;
                  border: 1px solid #3a3a5a;
                  transition: all 0.2s ease;
                  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            }

            .search-box:focus-within {
                  border-color: #ffb347;
                  box-shadow: 0 0 0 3px rgba(255, 180, 71, 0.3);
            }

            .search-box input {
                  flex: 1;
                  background: transparent;
                  border: none;
                  padding: 1rem 0;
                  font-size: 1rem;
                  color: #f0f0f0;
                  outline: none;
                  font-weight: 500;
            }

            .search-box input::placeholder {
                  color: #6a6a8b;
                  font-weight: 400;
            }

            .search-box button {
                  background: linear-gradient(100deg, #ffb347, #ff8c2e);
                  border: none;
                  padding: 0.7rem 1.8rem;
                  border-radius: 60px;
                  font-weight: 700;
                  font-size: 0.9rem;
                  color: #131128;
                  cursor: pointer;
                  transition: all 0.2s ease;
                  display: flex;
                  align-items: center;
                  gap: 8px;
                  letter-spacing: 0.3px;
                  box-shadow: 0 4px 12px rgba(255, 140, 46, 0.3);
            }

            .search-box button:hover {
                  background: linear-gradient(100deg, #ffc165, #ff9f3d);
                  transform: scale(0.96);
                  cursor: pointer;
            }

            .search-box button:active {
                  transform: scale(0.94);
            }

            /* Loading state */
            .loading {
                  text-align: center;
                  margin: 2rem 0;
                  color: #ffb86b;
                  font-weight: 500;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  gap: 12px;
                  background: #1e1e2e80;
                  padding: 1rem;
                  border-radius: 60px;
                  width: fit-content;
                  margin-left: auto;
                  margin-right: auto;
            }

            .spinner {
                  width: 22px;
                  height: 22px;
                  border: 3px solid rgba(255, 180, 71, 0.3);
                  border-top: 3px solid #ffb347;
                  border-radius: 50%;
                  animation: spin 0.8s linear infinite;
            }

            @keyframes spin {
                  0% {
                        transform: rotate(0deg);
                  }

                  100% {
                        transform: rotate(360deg);
                  }
            }

            /* Results section */
            .results-container {
                  margin-top: 1.8rem;
            }

            .results-header {
                  display: flex;
                  justify-content: space-between;
                  align-items: baseline;
                  margin-bottom: 1.2rem;
                  padding-bottom: 0.5rem;
                  border-bottom: 1px dashed rgba(255, 200, 120, 0.3);
                  flex-wrap: wrap;
                  gap: 0.5rem;
            }

            .results-header h3 {
                  color: #f2e8cf;
                  font-weight: 600;
                  font-size: 1.3rem;
                  letter-spacing: -0.2px;
            }

            .results-count {
                  background: #2a2744;
                  padding: 0.25rem 1rem;
                  border-radius: 40px;
                  font-size: 0.75rem;
                  font-weight: 500;
                  color: #ffd89a;
            }

            /* Movie Grid */
            .movie-grid {
                  display: grid;
                  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                  gap: 1.5rem;
                  margin-top: 0.8rem;
            }

            .movie-card {
                  background: #13122cd9;
                  backdrop-filter: blur(4px);
                  border-radius: 1.5rem;
                  overflow: hidden;
                  transition: transform 0.2s ease, box-shadow 0.2s;
                  border: 1px solid #2f2e4e;
                  box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.4);
            }

            .movie-card:hover {
                  transform: translateY(-6px);
                  border-color: #ffb34780;
                  box-shadow: 0 20px 28px -12px black;
            }

            .movie-img-placeholder {
                  background: linear-gradient(145deg, #2a2744, #100f23);
                  height: 180px;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  font-size: 3rem;
                  font-weight: 500;
                  color: #ffb347;
                  border-bottom: 2px solid #ffb34730;
            }

            .movie-info {
                  padding: 1.2rem 1rem 1.3rem;
            }

            .movie-title {
                  font-size: 1.2rem;
                  font-weight: 700;
                  color: white;
                  margin-bottom: 0.3rem;
                  line-height: 1.3;
            }

            .movie-meta {
                  display: flex;
                  gap: 12px;
                  margin: 0.5rem 0;
                  font-size: 0.75rem;
                  color: #b9b3e6;
            }

            .movie-year {
                  background: #25233e;
                  padding: 0.2rem 0.6rem;
                  border-radius: 20px;
            }

            .movie-genre {
                  background: #25233e;
                  padding: 0.2rem 0.6rem;
                  border-radius: 20px;
            }

            .movie-rating {
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  margin-top: 0.6rem;
                  font-size: 0.85rem;
                  color: #ffcd7e;
                  font-weight: 600;
            }

            .stars {
                  letter-spacing: 2px;
                  color: #f5b642;
            }

            .empty-state {
                  text-align: center;
                  padding: 3rem 1.5rem;
                  background: #1a193380;
                  border-radius: 2rem;
                  color: #afa9da;
                  border: 1px dashed #5a5380;
            }

            .error-message {
                  background: #4a1e2c80;
                  border-left: 5px solid #ff6b6b;
                  padding: 1rem;
                  border-radius: 1rem;
                  color: #ffc2b3;
                  text-align: center;
            }

            footer {
                  text-align: center;
                  margin-top: 2rem;
                  font-size: 0.7rem;
                  color: #59547c;
            }

            @media (max-width: 640px) {
                  .recommender-card {
                        padding: 1.2rem;
                  }

                  .hero h1 {
                        font-size: 2rem;
                  }

                  .search-box {
                        padding: 0.2rem 0.2rem 0.2rem 1rem;
                  }

                  .search-box button {
                        padding: 0.5rem 1.2rem;
                  }
            }
      </style>
</head>

<body>
      <div class="container">
            <div class="recommender-card">
                  <!-- Only heading & search bar as requested -->
                  <div class="hero">
                        <h1>🎬 Movie Recommendation</h1>
                        <!-- <div class="badge">AI powered suggestions · FastAPI backend</div> -->
                  </div>

                  <!-- Simple search bar -->
                  <div class="search-section">
                        <div class="search-box">
                              <input type="text" id="movieQuery"
                                    placeholder="e.g., Inception, The Dark Knight, comedy, sci-fi..."
                                    autocomplete="off">
                              <button id="searchBtn">
                                    <span>🔍</span> Recommend
                              </button>
                        </div>
                  </div>

                  <!-- Results area: dynamically populated -->
                  <div class="results-container" id="resultsContainer">
                        <div class="results-header" style="display: none;" id="resultsHeader">
                              <h3>✨ Recommendations for you</h3>
                              <span class="results-count" id="resultsCount"></span>
                        </div>
                        <div id="moviesList" class="movie-grid">
                              <div class="empty-state">
                                    ⭐ Enter a movie title, keyword, or genre above <br>
                                    and get smart recommendations from the FastAPI backend.
                              </div>
                        </div>
                  </div>
                  <footer>⚡ connected to FastAPI · real-time recommendations</footer>
            </div>
      </div>

      <script>
            // ======================== CONFIGURATION ========================
            // 🔁 IMPORTANT: Replace this URL with your actual FastAPI backend address
            // For local development: if your FastAPI server runs on http://localhost:8000
            // Default endpoint: POST /recommend (or /recommendations)
            // Adjust the endpoint path according to your FastAPI route.

            const API_BASE_URL = 'http://127.0.0.1:8000';     // <-- CHANGE IF DIFFERENT
            const RECOMMEND_ENDPOINT = '/recommend';          // Expected POST endpoint

            // Example: If your fastapi endpoint is POST /recommend?query=something
            // We'll send a JSON body: { "query": "user input" }
            // Modify according to your backend contract

            // DOM Elements
            const searchInput = document.getElementById('movieQuery');
            const searchBtn = document.getElementById('searchBtn');
            const moviesListDiv = document.getElementById('moviesList');
            const resultsHeader = document.getElementById('resultsHeader');
            const resultsCountSpan = document.getElementById('resultsCount');

            // Helper: Show loading state
            function showLoading() {
                  moviesListDiv.innerHTML = `
                        <div class="loading">
                        <div class="spinner"></div>
                        <span>Fetching recommendations from FastAPI ...</span>
                        </div>
                  `;
                  resultsHeader.style.display = 'none';
            }

            // Helper: Show error
            function showError(message) {
                  moviesListDiv.innerHTML = `
                        <div class="empty-state error-message">
                        ⚠️ ${message}<br>
                        <span style="font-size:0.8rem; margin-top:8px; display:inline-block;">💡 Make sure FastAPI server is running at ${API_BASE_URL} and CORS is enabled.</span>
                        </div>
                  `;
                  resultsHeader.style.display = 'none';
            }

            // Helper: Render movie cards from backend response
            // Expected response format: an array of movies OR { recommendations: [...] }
            // Each movie object can have fields: title, year, genre, rating, description, etc.
            function renderMovies(moviesArray) {
                  if (!moviesArray || moviesArray.length === 0) {
                        moviesListDiv.innerHTML = `
                              <div class="empty-state">
                              🎞️ No recommendations found for "${escapeHtml(searchInput.value)}".<br>
                              Try a different movie, keyword, or genre!
                              </div>
                        `;
                        resultsHeader.style.display = 'none';
                        return;
                  }

                  // Show results header with count
                  resultsHeader.style.display = 'flex';
                  resultsCountSpan.innerText = `${moviesArray.length} movie${moviesArray.length !== 1 ? 's' : ''}`;

                  // Build cards
                  const cardsHTML = moviesArray.map(movie => {
                        // Safely extract fields with fallbacks
                        const title = movie.title || movie.name || 'Untitled';
                        const year = movie.year || movie.release_year || 'N/A';
                        const genre = movie.genre || movie.genres || 'Recommended';
                        let rating = movie.rating || movie.vote_average || null;
                        let ratingValue = null;
                        if (rating && !isNaN(parseFloat(rating))) {
                              ratingValue = parseFloat(rating).toFixed(1);
                        }
                        const description = movie.description || movie.overview || 'AI-powered recommendation just for you.';

                        // Star visual
                        let starDisplay = '';
                        if (ratingValue) {
                              const starsFull = Math.min(5, Math.floor(parseFloat(ratingValue) / 2));
                              const starsEmpty = 5 - starsFull;
                              starDisplay = '★'.repeat(starsFull) + '☆'.repeat(starsEmpty);
                        } else {
                              starDisplay = '⭐ recommended';
                        }

                        // Genre icon helper
                        let genreIcon = "🎬";
                        const genreLower = (typeof genre === 'string' ? genre : '').toLowerCase();
                        if (genreLower.includes('action')) genreIcon = "⚡";
                        else if (genreLower.includes('drama')) genreIcon = "🎭";
                        else if (genreLower.includes('comedy')) genreIcon = "😂";
                        else if (genreLower.includes('sci-fi') || genreLower.includes('science')) genreIcon = "🛸";
                        else if (genreLower.includes('thriller')) genreIcon = "🔪";
                        else if (genreLower.includes('romance')) genreIcon = "💕";
                        else if (genreLower.includes('adventure')) genreIcon = "🗺️";

                        return `
                              <div class="movie-card">
                              <div class="movie-img-placeholder">
                                    ${genreIcon} 🎞️
                              </div>
                              <div class="movie-info">
                                    <div class="movie-title">${escapeHtml(title)}</div>
                                    <div class="movie-meta">
                                    <span class="movie-year">📅 ${escapeHtml(String(year))}</span>
                                    <span class="movie-genre">🎭 ${escapeHtml(typeof genre === 'string' ? genre : genre[0] || 'Movie')}</span>
                                    </div>
                                    ${ratingValue ? `<div class="movie-rating"><span>⭐ ${ratingValue}/10</span> <span class="stars">${starDisplay}</span></div>` : ''}
                                    <div style="font-size:0.7rem; margin-top: 8px; color:#b9b0e6; line-height:1.3;">${escapeHtml(description.substring(0, 100))}${description.length > 100 ? '…' : ''}</div>
                              </div>
                              </div>
                        `;
                  }).join('');

                  moviesListDiv.innerHTML = cardsHTML;
            }

            // Helper sanitize
            function escapeHtml(str) {
                  if (!str) return '';
                  return String(str).replace(/[&<>]/g, function (m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                  }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function (c) {
                        return c;
                  });
            }

            // Core function: call FastAPI backend
            async function fetchRecommendations(query) {
                  if (!query.trim()) {
                        moviesListDiv.innerHTML = `
                              <div class="empty-state">
                              🎬 Enter a movie title to get recommendations!
                              </div>`;
                        resultsHeader.style.display = 'none';
                        return;
                  }

                  showLoading();

                  try {
                        const requestBody = {
                              movie_name: query.trim()    // ✅ matches FastAPI MovieRequest
                        };

                        const response = await fetch("http://127.0.0.1:8000/recommend", {
                              method: 'POST',
                              headers: {
                                    'Content-Type': 'application/json',
                                    'Accept': 'application/json'
                              },
                              body: JSON.stringify(requestBody)
                        });

                        if (!response.ok) {
                              let errorDetail = `HTTP ${response.status}`;
                              try {
                                    const errData = await response.json();
                                    errorDetail = errData.detail || errData.message || errorDetail;
                              } catch (e) { }
                              throw new Error(`Server error: ${errorDetail}`);
                        }

                        const data = await response.json();
                        console.log("API response:", data);   // helpful for debugging

                        let recommendations = [];

                        if (Array.isArray(data)) {
                              // Plain array of strings or objects
                              recommendations = data.map(item =>
                                    typeof item === 'string' ? { title: item } : item
                              );
                        } else if (data.recommendations && Array.isArray(data.recommendations)) {
                              // ✅ Your FastAPI returns this format
                              recommendations = data.recommendations.map(item =>
                                    typeof item === 'string' ? { title: item } : item
                              );
                        } else {
                              console.warn('Unexpected response format:', data);
                        }

                        renderMovies(recommendations);

                  } catch (error) {
                        console.error('Recommendation fetch error:', error);
                        let userMsg = `Cannot reach FastAPI backend at ${API_BASE_URL}${RECOMMEND_ENDPOINT}. `;
                        userMsg += `Make sure your server is running and CORS is enabled. Detail: ${error.message}`;
                        showError(userMsg);
                  }
            }

            // Handler to trigger recommendation
            function handleSearch() {
                  const query = searchInput.value.trim();
                  if (query === "") {
                        moviesListDiv.innerHTML = `
                              <div class="empty-state">
                              🎯 Type a movie title or keyword — e.g., "Interstellar", "horror", "comedy" — then click Recommend.
                              </div>
                        `;
                        resultsHeader.style.display = 'none';
                        return;
                  }
                  fetchRecommendations(query);
            }

            // Event listeners
            searchBtn.addEventListener('click', handleSearch);
            searchInput.addEventListener('keypress', (e) => {
                  if (e.key === 'Enter') {
                        e.preventDefault();
                        handleSearch();
                  }
            });

            // Optional: initial check to show that API is not called yet
            console.log(`Movie Recommender UI ready — targeting ${API_BASE_URL}${RECOMMEND_ENDPOINT}`);
      </script>
</body>

</html>
